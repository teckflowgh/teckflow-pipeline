name: Dagelijkse TeckFlow Video Pipeline

on:
  # Nachtelijke cron UITGESCHAKELD op verzoek — enkel handmatig starten
  # schedule:
  #   - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install requests

      - name: Pod aanmaken en pipeline autonoom draaien
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          VIDEO_MODE: ${{ vars.VIDEO_MODE || 'short' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          VIDIQ_EMAIL: ${{ secrets.VIDIQ_EMAIL }}
          VIDIQ_PASSWORD: ${{ secrets.VIDIQ_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/github_runner.py
