name: Dagelijkse TeckFlow Video Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 02:00 Brussels (zomer) / 01:00 (winter)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Pipeline starten op RunPod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          VIDEO_MODE: ${{ vars.VIDEO_MODE || 'short' }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          python3 << 'EOF'
          import os, time, requests, json, sys, subprocess, tempfile

          API_KEY  = os.environ["RUNPOD_API_KEY"]
          POD_ID   = os.environ["RUNPOD_POD_ID"]
          MODE     = os.environ.get("VIDEO_MODE", "short")
          SSH_KEY  = os.environ.get("SSH_KEY", "")
          GQL_URL  = f"https://api.runpod.io/graphql?api_key={API_KEY}"

          def gql(query):
              r = requests.post(GQL_URL, json={"query": query}, timeout=30)
              r.raise_for_status()
              return r.json()

          # 1. Pod starten
          print("Pod starten...")
          gql(f'mutation {{ podResume(input: {{podId: "{POD_ID}", gpuCount: 1}}) {{ id }} }}')
          time.sleep(15)

          # 2. Wachten tot pod klaar is
          api_url = None
          ssh_host, ssh_port = None, None
          for _ in range(30):
              pod = gql(f'{{ pod(input: {{podId: "{POD_ID}"}}) {{ desiredStatus runtime {{ ports {{ ip isIpPublic privatePort publicPort type }} }} }} }}')
              runtime = pod["data"]["pod"].get("runtime") or {}
              ports = runtime.get("ports", [])
              for p in ports:
                  if p.get("privatePort") == 8000 and p.get("publicPort"):
                      api_url = f"https://{POD_ID}-8000.proxy.runpod.net"
                  if p.get("privatePort") == 22 and p.get("isIpPublic"):
                      ssh_host = p.get("ip")
                      ssh_port = p.get("publicPort")
              if api_url:
                  try:
                      if requests.get(f"{api_url}/", timeout=10).status_code == 200:
                          print(f"Pod klaar: {api_url}")
                          break
                  except:
                      pass
              print("Wachten op pod...")
              time.sleep(20)

          if not api_url:
              print("FOUT: Pod niet gestart.")
              sys.exit(1)

          # 3. edge-tts installeren + nieuwe synthesizer deployen via SSH
          if SSH_KEY and ssh_host and ssh_port:
              print(f"SSH setup via {ssh_host}:{ssh_port}...")
              # Schrijf SSH key naar tijdelijk bestand
              key_file = tempfile.mktemp()
              with open(key_file, 'w') as f:
                  f.write(SSH_KEY)
              os.chmod(key_file, 0o600)

              # Nieuwe xtts_synthesizer.py content
              new_synth = '''import asyncio
from pathlib import Path
import logging
logger = logging.getLogger(__name__)
async def _synth(text, out, lang):
    import edge_tts
    voices = {"nl": "nl-NL-ColetteNeural", "en": "en-US-JennyNeural", "fr": "fr-FR-DeniseNeural"}
    voice = voices.get(lang, "nl-NL-ColetteNeural")
    await edge_tts.Communicate(text, voice).save(str(out))
def synthesize_speech(script, reference_wav, output_path, language="nl", use_gpu=None):
    output_path = Path(output_path).resolve()
    output_path.parent.mkdir(parents=True, exist_ok=True)
    try:
        import edge_tts
    except ImportError:
        import subprocess
        subprocess.run(["pip", "install", "edge-tts", "-q"], check=True)
    asyncio.run(_synth(script, output_path, language))
    logger.info("Spraak klaar: %s (%d KB)", output_path.name, output_path.stat().st_size // 1024)
    return output_path
'''
              # Deploycommando via SSH
              setup_cmd = f"""
pip install edge-tts -q
cat > /workspace/project/pipeline/stage2_voice/xtts_synthesizer.py << 'PYEOF'
{new_synth}
PYEOF
pm2 restart teckflow-api
echo SETUP_DONE
"""
              result = subprocess.run(
                  ["ssh", "-i", key_file, "-o", "StrictHostKeyChecking=no",
                   "-p", str(ssh_port), f"root@{ssh_host}", setup_cmd],
                  capture_output=True, text=True, timeout=120
              )
              print("SSH output:", result.stdout[-500:])
              if result.returncode != 0:
                  print("SSH fout:", result.stderr[-200:])
              os.unlink(key_file)
              time.sleep(10)
          else:
              print("Geen SSH key beschikbaar — edge-tts fix overgeslagen.")

          time.sleep(15)

          # 4. Pipeline triggeren
          print(f"Pipeline starten (modus: {MODE})...")
          r = requests.post(f"{api_url}/api/run", json={"mode": MODE}, timeout=30)
          run_id = r.json().get("run_id")
          print(f"Run ID: {run_id}")

          # 5. Wachten op resultaat
          for _ in range(90):
              time.sleep(30)
              status = requests.get(f"{api_url}/api/status", timeout=15).json()
              s = status.get("status", "")
              print(f"Stage: {status.get('current_stage')} | Status: {s} | Topic: {status.get('topic', '')}")
              if s in ("completed", "failed"):
                  print(json.dumps(status, indent=2, ensure_ascii=False))
                  if s == "failed":
                      sys.exit(1)
                  break

          # 6. Pod stoppen
          print("Pod stoppen...")
          gql(f'mutation {{ podStop(input: {{podId: "{POD_ID}"}}) {{ id }} }}')
          print("Klaar!")
          EOF
